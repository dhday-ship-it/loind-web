<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story | LOIND</title>
    <style>
      /* --- Reset & Base Styles (메인 인덱스 및 서비스 완벽 일치) --- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      }
      body {
        background-color: #ffffff;
        color: #111111;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      ul {
        list-style: none;
      }

      .container {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* --- Header (서비스 페이지와 100% 동일하게 복원) --- */
      .header {
        background-color: #fff;
        padding: 35px 0;
        border-bottom: 1px solid #f0f0f0;
      }

      .header .container {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .logo::before {
        content: '';
      }

      .nav {
        display: flex;
        align-items: center;
      }

      .nav a {
        margin-left: 45px;
        font-size: 15px;
        font-weight: 500;
        color: #555;
        transition: color 0.3s;
      }

      .nav a:hover, .nav a.active {
        color: #000;
        font-weight: 700;
      }

      /* --- 1. Top Featured Content (상단 메인 빅 배너) --- */
      .featured-section {
        padding: 60px 0 40px 0;
      }
      .featured-grid {
        display: grid;
        grid-template-columns: 1.3fr 1fr;
        gap: 40px;
        align-items: center;
      }
      .featured-img-box {
        width: 100%;
        aspect-ratio: 16/10;
        border-radius: 14px;
        overflow: hidden;
        background: #f7f6f9;
      }
      .featured-img-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .featured-txt-box {
        padding-right: 20px;
      }
      .featured-date {
        font-size: 13px;
        color: #999;
        font-weight: 500;
        margin-bottom: 12px;
      }
      .featured-title {
        font-size: 32px;
        font-weight: 800;
        line-height: 1.3;
        color: #111;
        margin-bottom: 20px;
        word-break: keep-all;
      }
      .featured-desc {
        font-size: 14px;
        color: #555;
        line-height: 1.7;
        margin-bottom: 24px;
        word-break: keep-all;
      }
      .view-featured-detail {
        font-size: 13px;
        font-weight: 700;
        color: #5533ff;
        cursor: pointer;
        display: inline-block;
        transition: opacity 0.2s;
      }
      .view-featured-detail:hover {
        opacity: 0.7;
      }

      /* --- 2. Filter Tab Area --- */
      .filter-section {
        border-top: 1px solid #f0f0f0;
        padding-top: 40px;
        margin-bottom: 30px;
      }
      .mainCategory {
        display: flex;
        gap: 28px;
        margin-bottom: 24px;
      }
      .mainCategory li {
        font-size: 18px;
        font-weight: 500;
        color: #aaa;
        cursor: pointer;
        transition: color 0.2s;
      }
      .mainCategory li.active {
        color: #111;
        font-weight: 800;
      }
      #sub {
        display: flex;
        gap: 10px;
      }
      #sub li {
        font-size: 11px;
        color: #555;
        background: #ffffff;
        border: 1px solid #eaeaea;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.2s;
      }
      #sub li.on {
        background: rgba(85, 51, 255, 0.08);
        color: #5533ff;
        border-color: transparent;
        font-weight: 700;
      }

      /* --- 3. Main Layout Grid (2단 구조 피드) --- */
      .layout-grid {
        display: grid;
        grid-template-columns: 1.8fr 1fr;
        gap: 60px;
        padding-bottom: 100px;
      }

      /* Left: News List */
      #storyBoard {
        display: flex;
        flex-direction: column;
      }
      #storyBoard li {
        display: flex;
        justify-content: space-between;
        gap: 30px;
        padding: 35px 0;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
      }
      #storyBoard li:first-child {
        padding-top: 0;
      }
      #storyBoard li .list-txt {
        flex: 1;
      }
      #storyBoard li .list-date {
        font-size: 12px;
        color: #999;
        margin-bottom: 10px;
        font-weight: 500;
      }
      #storyBoard li h4 {
        font-size: 18px;
        font-weight: 800;
        color: #111;
        margin-bottom: 12px;
        line-height: 1.4;
        transition: color 0.2s;
      }
      #storyBoard li:hover h4 {
        color: #5533ff;
      }
      #storyBoard li .list-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 15px;
      }
      #storyBoard li .tag-node {
        font-size: 11px;
        font-weight: 500;
        color: #555;
        background: #ffffff;
        border: 1px solid #eaeaea;
        padding: 6px 12px;
        border-radius: 6px;
      }
      #storyBoard li .list-img {
        width: 160px;
        aspect-ratio: 16/10;
        border-radius: 14px;
        overflow: hidden;
        background: #f7f6f9;
      }
      #storyBoard li .list-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Right: Sidebar */
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 50px;
      }
      .side-title {
        font-size: 14px;
        font-weight: 800;
        color: #111;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .recommend-list li {
        font-size: 14px;
        font-weight: 700;
        color: #333;
        padding: 14px 0;
        border-bottom: 1px solid #f9f9f9;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: color 0.2s;
      }
      .recommend-list li:hover {
        color: #5533ff;
      }
      .tag-cloud {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .cloud-tag {
        font-size: 11px;
        font-weight: 500;
        color: #555;
        background: #ffffff;
        border: 1px solid #eaeaea;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .cloud-tag:hover {
        background: rgba(85, 51, 255, 0.08);
        color: #5533ff;
        border-color: transparent;
      }

      .empty {
        text-align: center;
        padding: 80px 0;
        color: #aaa;
        font-size: 14px;
        width: 100%;
      }

      /* --- Modal System --- */
      .modal_overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(11, 11, 11, 0.6);
        backdrop-filter: blur(8px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        padding: 20px;
      }
      .modal_overlay.active {
        display: flex;
      }
      .modal_content {
        background: #ffffff;
        width: 100%;
        max-width: 640px;
        max-height: 80vh;
        border-radius: 16px;
        padding: 40px;
        transform: translateY(30px);
        transition: all 0.3s ease;
        overflow-y: auto;
      }
      .modal_overlay.active .modal_content {
        transform: translateY(0);
      }
      .modal_body img {
        width: 100%;
        max-height: 380px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 30px;
        display: block;
      }
      .modal_body h2 {
        font-size: 24px;
        margin-bottom: 16px;
        color: #111111;
        font-weight: 800;
        line-height: 1.3;
      }
      .modal_body p {
        line-height: 1.7;
        color: #333333;
        font-size: 14px;
        word-break: keep-all;
      }

      /* --- Responsive --- */
      @media (max-width: 960px) {
        .featured-grid { grid-template-columns: 1fr; gap: 20px; }
        .layout-grid { grid-template-columns: 1fr; gap: 50px; }
        .sidebar { border-top: 1px solid #f0f0f0; padding-top: 40px; }
      }
      @media (max-width: 768px) {
        .header { padding: 25px 0; }
        .header .container { flex-direction: column; gap: 20px; text-align: center; }
        .nav a { margin: 0 15px; }
        #storyBoard li { gap: 15px; }
        #storyBoard li .list-img { width: 110px; }
      }
    </style>
  </head>
  <body>

    <header class="header">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'">LOIND</div>
            <nav class="nav">
                <a href="index.html">About</a>
                <a href="service.html">Service</a>
                <a href="story.html" class="active">Story</a>
                <a href="#">Contact</a>
            </nav>
        </div>
    </header>

    <section class="featured-section">
      <div class="container">
        <div class="featured-grid" id="featuredSection">
          </div>
      </div>
    </section>

    <div class="container">
      <div class="filter-section">
        <ul class="mainCategory">
          <li id="business" class="active">비즈니스</li>
          <li id="impact">임팩트</li>
        </ul>
        <ul id="sub"></ul>
      </div>
    </div>

    <div class="container">
      <div class="layout-grid">
        <main>
          <ul id="storyBoard"></ul>
        </main>

        <aside class="sidebar">
          <div class="side-box">
            <p class="side-title">추천 소식</p>
            <ul class="recommend-list" id="recommendList">
              </ul>
          </div>
          <div class="side-box">
            <p class="side-title">태그</p>
            <div class="tag-cloud" id="tagCloud">
              </div>
          </div>
        </aside>
      </div>
    </div>

    <div id="modal" class="modal_overlay">
      <div class="modal_content">
        <div class="modal_body"></div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
        query,
        orderBy,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBnJ_bgRb51sUUDlatipuREsfrDcoTQy1U",
        authDomain: "loind-472cd.firebaseapp.com",
        projectId: "loind-472cd",
        storageBucket: "loind-472cd.firebasestorage.app",
        messagingSenderId: "405998534289",
        appId: "1:405998534289:web:0f861bc822e1ea5391c930",
        measurementId: "G-5B5MM51YH2",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      let storyData = {};
      let allFlatStories = [];

      const subData = {
        business: ["PLATFORM", "COMMERCE"],
        impact: ["SOCIAL IMPACT", "CULTURE"],
      };

      const sub = document.querySelector("#sub");
      const storyBoard = document.querySelector("#storyBoard");
      const mainCategory = document.querySelectorAll(".mainCategory li");
      const modal = document.querySelector("#modal");
      const modalBody = document.querySelector(".modal_body");
      const featuredSection = document.querySelector("#featuredSection");
      const recommendList = document.querySelector("#recommendList");
      const tagCloud = document.querySelector("#tagCloud");

      async function loadStories() {
        storyBoard.innerHTML = "<li class='empty'>데이터를 불러오는 중...</li>";
        try {
          const q = query(collection(db, "stories"), orderBy("createdAt", "desc"));
          const querySnapshot = await getDocs(q);

          storyData = {};
          allFlatStories = [];

          querySnapshot.forEach((doc) => {
            const item = doc.data();
            const cate = item.category;

            let formattedDate = "2026.05.27"; 
            if(item.createdAt) {
               const d = item.createdAt.toDate ? item.createdAt.toDate() : new Date(item.createdAt);
               const yyyy = d.getFullYear();
               const mm = String(d.getMonth() + 1).padStart(2, '0');
               const dd = String(d.getDate()).padStart(2, '0');
               formattedDate = `${yyyy}.${mm}.${dd}`;
            }
            
            const structuredItem = { ...item, id: doc.id, dateText: formattedDate };

            if (!storyData[cate]) storyData[cate] = [];
            storyData[cate].push(structuredItem);
            allFlatStories.push(structuredItem);
          });

          renderGlobalComponents();
          renderSub("business");
        } catch (e) {
          console.error("데이터 로드 실패: ", e);
          storyBoard.innerHTML = "<li class='empty'>서버 연결 오류가 발생했습니다.</li>";
        }
      }

      function renderGlobalComponents() {
        if (allFlatStories.length === 0) return;

        const topStory = allFlatStories[0];
        featuredSection.innerHTML = `
          <div class="featured-img-box"><img src="${topStory.img}" alt="${topStory.title}"></div>
          <div class="featured-txt-box">
            <p class="featured-date">${topStory.dateText}</p>
            <h3 class="featured-title">${topStory.title}</h3>
            <p class="featured-desc">${topStory.text}</p>
            <div class="view-featured-detail" data-id="${topStory.id}">스토리 보기 →</div>
          </div>
        `;

        featuredSection.querySelector('.view-featured-detail').addEventListener('click', () => {
          openModalHandler(topStory);
        });

        recommendList.innerHTML = "";
        allFlatStories.slice(0, 4).forEach(item => {
          const li = document.createElement("li");
          li.innerText = item.title;
          li.addEventListener('click', () => openModalHandler(item));
          recommendList.appendChild(li);
        });

        const tags = ["#플랫폼테크", "#커머스", "#소셜임팩트", "#컬처", "#브랜딩", "#AI인프라", "#글로벌"];
        tagCloud.innerHTML = "";
        tags.forEach(t => {
          const span = document.createElement("span");
          span.className = "cloud-tag";
          span.innerText = t;
          tagCloud.appendChild(span);
        });
      }

      function renderSub(type) {
        sub.innerHTML = "";
        subData[type].forEach((item) => {
          const li = document.createElement("li");
          li.innerText = item;
          sub.appendChild(li);
        });

        const firstLi = sub.querySelector("li");
        if (firstLi) {
          sub.querySelectorAll("li").forEach((l) => l.classList.remove("on"));
          firstLi.classList.add("on");
          renderStoryBoard(firstLi.innerText);
        }
      }

      function renderStoryBoard(subName) {
        storyBoard.innerHTML = "";
        const currentList = storyData[subName] || [];

        if (currentList.length > 0) {
          currentList.forEach((item) => {
            const li = document.createElement("li");
            li.innerHTML = `
              <div class="list-txt">
                <p class="list-date">${item.dateText}</p>
                <h4>${item.title}</h4>
                <div class="list-tags">
                  <span class="tag-node">#${subName}</span>
                  <span class="tag-node">#LOIND</span>
                </div>
              </div>
              <div class="list-img"><img src="${item.img}" alt="${item.title}"></div>
            `;
            li.addEventListener("click", () => openModalHandler(item));
            storyBoard.appendChild(li);
          });
        } else {
          storyBoard.innerHTML = `<li class='empty'>'${subName}' 카테고리에 등록된 스토리가 없습니다.</li>`;
        }
      }

      function openModalHandler(targetData) {
        modalBody.innerHTML = `
          <img src="${targetData.img}" alt="${targetData.title}">
          <h2>${targetData.title}</h2>
          <p style="font-weight:700; color:#5533ff; margin-bottom:14px; font-size:15px;">${targetData.text}</p>
          <div style="margin-top:20px; padding-top:25px; border-top:1px solid #f0f0f0; color:#555; line-height:1.8; font-size:14px;">
            ${targetData.detail ? targetData.detail.replace(/\n/g, "<br>") : "내용이 없습니다."}
          </div>
        `;
        modal.classList.add("active");
        document.body.style.overflow = "hidden";
      }

      mainCategory.forEach((btn) => {
        btn.addEventListener("click", () => {
          mainCategory.forEach((li) => li.classList.remove("active"));
          btn.classList.add("active");
          renderSub(btn.id);
        });
      });

      sub.addEventListener("click", (e) => {
        if (e.target.tagName === "LI") {
          sub.querySelectorAll("li").forEach((li) => li.classList.remove("on"));
          e.target.classList.add("on");
          renderStoryBoard(e.target.innerText);
        }
      });

      const closeModal = () => {
        modal.classList.remove("active");
        document.body.style.overflow = "auto";
      };

      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
      });

      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && modal.classList.contains("active")) {
          closeModal();
        }
      });

      loadStories();
    </script>
  </body>
</html>
