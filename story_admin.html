<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | LOIND Story Management</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Pretendard", sans-serif;
        background: #f5f5f7;
        padding: 50px;
        color: #333;
        display: none; /* 비밀번호 확인 전까지 숨김 */
      }
      h1 {
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      h1 span {
        font-size: 1rem;
        background: #8e55ff;
        color: #fff;
        padding: 4px 12px;
        border-radius: 20px;
      }

      .input_section {
        background: #fff;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        margin-bottom: 40px;
      }
      .grid_form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      textarea {
        grid-column: span 2;
        height: 100px;
        resize: none;
      }
      .full {
        grid-column: span 2;
      }
      .file_label {
        grid-column: span 2;
        font-size: 0.9rem;
        font-weight: bold;
        color: #8e55ff;
        margin-bottom: -10px;
      }

      button#add_btn {
        grid-column: span 2;
        padding: 15px;
        background: #8e55ff;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
        transition: 0.3s;
      }
      button#add_btn:hover {
        background: #7644e0;
      }
      button#add_btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      .list_section {
        background: #fff;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid #eee;
        font-size: 0.85rem;
      }
      th {
        background: #f9f9f9;
        color: #666;
        font-weight: 600;
      }
      .thumb {
        width: 80px;
        height: 50px;
        object-fit: cover;
        border-radius: 4px;
      }

      .edit_btn {
        background: #4da3ff;
        color: #fff;
        border: none;
        padding: 6px 10px;
        border-radius: 4px;
        cursor: pointer;
        margin-right: 5px;
      }
      .del_btn {
        background: #ff4d4d;
        color: #fff;
        border: none;
        padding: 6px 10px;
        border-radius: 4px;
        cursor: pointer;
      }

      .nav_links {
        margin-bottom: 20px;
      }
      .nav_links a {
        color: #8e55ff;
        font-weight: 600;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="nav_links">
      <a href="story.html">← 사용자 페이지로 돌아가기</a>
    </div>

    <h1>Story 관리자 <span>Admin</span></h1>

    <div class="input_section">
      <div class="grid_form">
        <select id="new_category">
          <option value="platform">platform</option>
          <option value="commerce">commerce</option>
          <option value="착한일">착한일</option>
          <option value="착한일2">착한일2</option>
        </select>
        <input type="text" id="new_title" placeholder="제목을 입력하세요" />

        <p class="file_label">
          이미지 파일 첨부 (파일을 선택하면 URL 입력보다 우선 적용됩니다)
        </p>
        <input type="file" id="new_img_file" class="full" accept="image/*" />
        <input
          type="text"
          id="new_img_url"
          class="full"
          placeholder="또는 이미지 URL 직접 입력 (https://...)"
        />

        <input
          type="text"
          id="new_text"
          class="full"
          placeholder="목록에 보일 짧은 요약 문구"
        />
        <textarea
          id="new_detail"
          placeholder="팝업 상세 내용을 입력하세요"
        ></textarea>
        <button id="add_btn">새 스토리 데이터 등록하기</button>
      </div>
    </div>

    <div class="list_section">
      <h3>등록된 데이터 목록</h3>
      <table id="data_table">
        <thead>
          <tr>
            <th>이미지</th>
            <th>제목</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script type="module">
      // 1. 비밀번호 체크 (가장 먼저 실행)
      const masterPassword = "1234";
      if (prompt("관리자 인증이 필요합니다.") === masterPassword) {
        document.body.style.display = "block";
      } else {
        alert("비밀번호가 틀렸습니다.");
        location.href = "story.html";
      }

      // 2. Firebase SDK import
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        getDocs,
        deleteDoc,
        doc,
        query,
        orderBy,
        updateDoc,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
      import {
        getStorage,
        ref,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBnJ_bgRb51sUUDlatipuREsfrDcoTQy1U",
        authDomain: "loind-472cd.firebaseapp.com",
        projectId: "loind-472cd",
        storageBucket: "loind-472cd.firebasestorage.app",
        messagingSenderId: "405998534289",
        appId: "1:405998534289:web:0f861bc822e1ea5391c930",
        measurementId: "G-5B5MM51YH2",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const storage = getStorage(app);

      const tableBody = document.querySelector("#data_table tbody");
      const addBtn = document.querySelector("#add_btn");
      let editId = null; // 수정 모드 확인용 변수

      // [기능 1] 데이터 목록 불러오기 (이미지, 제목만)
      async function renderTable() {
        tableBody.innerHTML =
          "<tr><td colspan='3' style='text-align:center; padding:20px;'>로드 중...</td></tr>";
        try {
          const q = query(
            collection(db, "stories"),
            orderBy("createdAt", "desc")
          );
          const querySnapshot = await getDocs(q);
          tableBody.innerHTML = "";

          querySnapshot.forEach((docSnap) => {
            const item = docSnap.data();
            const id = docSnap.id;
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td><img src="${item.img}" class="thumb"></td>
              <td><strong>${item.title}</strong><br><small style="color:#999">${item.category}</small></td>
              <td>
                <button class="edit_btn" data-id="${id}">수정</button>
                <button class="del_btn" data-id="${id}">삭제</button>
              </td>
            `;
            tableBody.appendChild(tr);
          });
        } catch (e) {
          console.error(e);
          tableBody.innerHTML =
            "<tr><td colspan='3' style='text-align:center; color:red;'>로드 실패</td></tr>";
        }
      }

      // [기능 2] 데이터 등록/수정 실행
      addBtn.addEventListener("click", async () => {
        const file = document.querySelector("#new_img_file").files[0];
        let imageUrl = document.querySelector("#new_img_url").value;
        const title = document.querySelector("#new_title").value;

        if (!title) return alert("제목은 필수입니다!");

        addBtn.disabled = true;
        addBtn.innerText = editId ? "수정 중..." : "등록 중...";

        try {
          // 파일이 선택된 경우 Storage에 업로드 후 URL 추출
          if (file) {
            const storageRef = ref(
              storage,
              "images/" + Date.now() + "_" + file.name
            );
            const snapshot = await uploadBytes(storageRef, file);
            imageUrl = await getDownloadURL(snapshot.ref);
          }

          if (!imageUrl) {
            addBtn.disabled = false;
            addBtn.innerText = "등록하기";
            return alert("이미지 파일이나 URL 중 하나는 입력해야 합니다!");
          }

          const data = {
            category: document.querySelector("#new_category").value,
            title: title,
            img: imageUrl,
            text: document.querySelector("#new_text").value,
            detail: document.querySelector("#new_detail").value,
            createdAt: new Date(),
          };

          if (editId) {
            // 수정 모드
            await updateDoc(doc(db, "stories", editId), data);
            alert("수정되었습니다!");
            editId = null;
            addBtn.innerText = "새 스토리 데이터 등록하기";
          } else {
            // 신규 등록 모드
            await addDoc(collection(db, "stories"), data);
            alert("성공적으로 등록되었습니다!");
          }

          location.reload();
        } catch (e) {
          alert("오류: " + e.message);
          addBtn.disabled = false;
        }
      });

      // [기능 3] 수정/삭제 버튼 클릭 핸들러 (이벤트 위임)
      tableBody.addEventListener("click", async (e) => {
        const id = e.target.dataset.id;

        // 삭제 로직
        if (e.target.classList.contains("del_btn")) {
          if (confirm("정말 삭제하시겠습니까?")) {
            await deleteDoc(doc(db, "stories", id));
            renderTable();
          }
        }

        // 수정 로직 (입력창에 데이터 채우기)
        if (e.target.classList.contains("edit_btn")) {
          const q = await getDocs(collection(db, "stories"));
          const item = q.docs.find((d) => d.id === id).data();

          document.querySelector("#new_category").value = item.category;
          document.querySelector("#new_title").value = item.title;
          document.querySelector("#new_img_url").value = item.img;
          document.querySelector("#new_text").value = item.text;
          document.querySelector("#new_detail").value = item.detail;

          editId = id;
          addBtn.innerText = "선택한 데이터 수정 완료하기";
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });

      renderTable();
    </script>
  </body>
</html>
