<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LOIND | The Greatest Experience</title>

        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

        <style>
            /* --- [1. RESET & CURSOR] --- */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                -webkit-font-smoothing: antialiased;
                cursor: none !important;
            }
            body {
                background-color: #fff;
                color: #000;
                font-family: 'Pretendard', sans-serif;
                overflow-x: hidden;
            }
            a {
                color: inherit;
                text-decoration: none;
            }

            #cursor {
                position: fixed;
                width: 10px;
                height: 10px;
                background: #8e55ff;
                border-radius: 50%;
                pointer-events: none;
                z-index: 99999;
                will-change: transform;
            }
            #cursor.hover {
                background: #7236ff;
                box-shadow: 0 0 20px rgba(142, 85, 255, 0.6);
            }
            #cursor.grabbing {
                transform: scale(0.6);
                background: #333;
            }

            /* --- [2. LOADER] --- */
            #loader {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10000;
            }
            .loader-text {
                font-size: 1.5rem;
                font-weight: 900;
                letter-spacing: 10px;
            }

            /* --- [3. HEADER] --- */
            header {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 80px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 50px;
                background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(15px);
                z-index: 1000;
                border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            }
            h1 .main {
                font-size: 1.3rem;
                font-weight: 900;
                letter-spacing: 2px;
            }
            nav ul {
                display: flex;
                gap: 35px;
                list-style: none;
            }
            nav li {
                font-size: 0.8rem;
                font-weight: 800;
            }

            /* --- [4. MAIN VISUAL (50vh)] --- */
            #visual-portal {
                width: 100%;
                height: 50vh;
                display: grid;
                grid-template-columns: 1.4fr 1fr;
                padding-top: 80px;
                border-bottom: 1px solid #f2f2f2;
            }
            .hero-main {
                position: relative;
                overflow: hidden;
                background: #f9f9f9;
            }
            .hero-main img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .hero-caption {
                position: absolute;
                bottom: 40px;
                left: 60px;
                z-index: 10;
            }
            .hero-caption h2 {
                font-size: clamp(2.5rem, 4vw, 3.5rem);
                font-weight: 900;
                line-height: 1.1;
                letter-spacing: -2px;
            }

            .hero-side {
                padding: 40px 60px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 30px;
                border-left: 1px solid #f2f2f2;
            }
            .side-post span {
                font-size: 0.7rem;
                font-weight: 800;
                color: #8e55ff;
                display: block;
                margin-bottom: 5px;
            }
            .side-post h4 {
                font-size: 1rem;
                font-weight: 700;
                line-height: 1.4;
                color: #333;
            }

            /* --- [5. STORY SECTION] --- */
            .section-story {
                padding: 120px 0 100px 50px;
                overflow: visible !important;
            }
            .section-title {
                padding-right: 50px;
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                margin-bottom: 100px;
                border-bottom: 1px solid #eee;
                padding-bottom: 25px;
            }
            .section-title h3 {
                font-size: 2rem;
                font-weight: 900;
            }

            .story-container {
                display: flex;
                gap: 40px;
                overflow-x: auto;
                padding: 40px 50px 80px 0; /* 호버 공간 확보 */
                -ms-overflow-style: none;
                scrollbar-width: none;
                user-select: none;
                cursor: grab;
            }
            .story-container::-webkit-scrollbar {
                display: none;
            }

            .story-item {
                flex: 0 0 500px;
                border-radius: 24px;
                overflow: hidden;
                border: 1px solid #f0f0f0;
                transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
                background: #fff;
            }
            .story-item:hover {
                transform: translateY(-40px);
                border-color: #8e55ff;
                box-shadow: 0 40px 70px rgba(142, 85, 255, 0.15);
            }
            .story-img {
                width: 100%;
                aspect-ratio: 16/11;
                overflow: hidden;
                background: #f5f5f5;
                pointer-events: none;
            }
            .story-img img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .story-txt {
                padding: 35px;
                pointer-events: none;
            }
            .story-txt h4 {
                font-size: 1.4rem;
                font-weight: 800;
                margin-bottom: 12px;
            }
            .story-txt p {
                font-size: 1rem;
                color: #666;
                line-height: 1.6;
            }

            /* --- [6. VISUAL ARCHIVE] --- */
            .section-visual {
                padding: 150px 50px;
                border-top: 1px solid #f2f2f2;
            }
            .v-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 60px 0;
                border-bottom: 1px solid #eee;
                position: relative;
            }
            .v-title {
                font-size: 3.5rem;
                font-weight: 900;
                color: #eee;
                transition: 0.5s;
            }
            .v-img-float {
                position: absolute;
                right: 10%;
                top: 50%;
                transform: translateY(-50%) scale(0.8);
                width: 480px;
                height: 300px;
                border-radius: 24px;
                overflow: hidden;
                opacity: 0;
                visibility: hidden;
                transition: 0.6s cubic-bezier(0.2, 1, 0.3, 1);
                z-index: 1;
                pointer-events: none;
            }
            .v-img-float img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .v-item:hover .v-title {
                color: #000;
                transform: translateX(40px);
            }
            .v-item:hover .v-img-float {
                opacity: 1;
                visibility: visible;
                transform: translateY(-50%) scale(1);
                right: 5%;
            }

            footer {
                padding: 100px 50px;
                border-top: 1px solid #f2f2f2;
                color: #bbb;
                display: flex;
                justify-content: space-between;
                font-weight: 700;
            }
        </style>
    </head>
    <body>
        <div id="loader"><div class="loader-text">LOIND</div></div>
        <div id="cursor"></div>

        <header>
            <h1>
                <a href="index.html"><span class="main">LOIND</span></a>
            </h1>
            <nav>
                <ul>
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="service.html">SERVICE</a></li>
                    <li><a href="story.html">STORY</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                </ul>
            </nav>
        </header>

        <main id="mainContent" style="opacity: 0">
            <section id="visual-portal">
                <div class="hero-main">
                    <img
                        src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000"
                        alt="Main Visual"
                    />
                    <div class="hero-caption">
                        <h2>Designing<br />Future Value.</h2>
                    </div>
                </div>
                <div class="hero-side">
                    <div class="side-post">
                        <span>Insight</span>
                        <h4>
                            브랜드의 본질을 찾아가는 로인드만의 디자인 프로세스
                        </h4>
                    </div>
                    <div class="side-post">
                        <span>Update</span>
                        <h4>2026 웹 트렌드: 인터랙티브 디자인의 새로운 지표</h4>
                    </div>
                    <div class="side-post">
                        <span>Studio</span>
                        <h4>새로운 영감을 위한 오피스 리뉴얼 프로젝트 완료</h4>
                    </div>
                </div>
            </section>

            <section class="section-story">
                <div class="section-title">
                    <h3>STORIES</h3>
                    <span
                        style="
                            font-size: 0.75rem;
                            font-weight: 800;
                            color: #8e55ff;
                        "
                        >DRAG OR SCROLL →</span
                    >
                </div>
                <div class="story-container" id="storyBoard"></div>
            </section>

            <section class="section-visual">
                <div class="section-title"><h3>VISUAL ARCHIVE</h3></div>
                <div class="v-accordion">
                    <div class="v-item">
                        <h4 class="v-title">CORE IDENTITY</h4>
                        <div class="v-img-float">
                            <img
                                src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1200"
                            />
                        </div>
                    </div>
                    <div class="v-item">
                        <h4 class="v-title">DIGITAL FLOW</h4>
                        <div class="v-img-float">
                            <img
                                src="https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?q=80&w=1200"
                            />
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div>LOIND STUDIO.</div>
            <div>© 2026 LOIND.</div>
        </footer>

        <script type="module">
            import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
            import {
                getFirestore,
                collection,
                getDocs,
                query,
                orderBy,
                limit,
            } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

            const firebaseConfig = {
                apiKey: 'AIzaSyBnJ_bgRb51sUUDlatipuREsfrDcoTQy1U',
                authDomain: 'loind-472cd.firebaseapp.com',
                projectId: 'loind-472cd',
                appId: '1:405998534289:web:0f861bc822e1ea5391c930',
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            // [1] 커서
            const cursor = document.querySelector('#cursor');
            const xTo = gsap.quickTo(cursor, 'x', {
                duration: 0.1,
                ease: 'power3',
            });
            const yTo = gsap.quickTo(cursor, 'y', {
                duration: 0.1,
                ease: 'power3',
            });
            window.addEventListener('mousemove', (e) => {
                xTo(e.clientX - 5);
                yTo(e.clientY - 5);
            });

            document.addEventListener('mouseover', (e) => {
                if (e.target.closest('a, .story-item, .v-item')) {
                    cursor.classList.add('hover');
                    gsap.to(cursor, { scale: 3, duration: 0.3 });
                }
            });
            document.addEventListener('mouseout', (e) => {
                if (e.target.closest('a, .story-item, .v-item')) {
                    cursor.classList.remove('hover');
                    gsap.to(cursor, { scale: 1, duration: 0.3 });
                }
            });

            // [2] 로더
            window.addEventListener('load', () => {
                gsap.timeline()
                    .to('#loader', {
                        opacity: 0,
                        duration: 0.6,
                        delay: 0.5,
                        onComplete: () =>
                            document.querySelector('#loader').remove(),
                    })
                    .to('#mainContent', { opacity: 1, duration: 0.8 }, '-=0.2');
            });

            // [3] 드래그 & 개선된 휠 스크롤
            const slider = document.querySelector('.story-container');
            let isDown = false,
                startX,
                scrollLeft;

            slider.addEventListener(
                'wheel',
                (e) => {
                    const isAtEnd =
                        slider.scrollLeft + slider.clientWidth >=
                        slider.scrollWidth - 1;
                    const isAtStart = slider.scrollLeft <= 0;

                    // 가로 스크롤이 더 할 게 있을 때만 세로 스크롤 막기
                    if (
                        !(
                            (e.deltaY > 0 && isAtEnd) ||
                            (e.deltaY < 0 && isAtStart)
                        )
                    ) {
                        e.preventDefault();
                        slider.scrollLeft += e.deltaY * 1.5;
                    }
                },
                { passive: false },
            );

            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                slider.classList.add('grabbing');
                cursor.classList.add('grabbing');
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });
            window.addEventListener('mouseup', () => {
                isDown = false;
                cursor.classList.remove('grabbing');
            });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2;
                slider.scrollLeft = scrollLeft - walk;
            });

            // [4] 데이터 로드
            async function loadStories() {
                const storyBoard = document.querySelector('#storyBoard');
                try {
                    const q = query(
                        collection(db, 'stories'),
                        orderBy('createdAt', 'desc'),
                        limit(8),
                    );
                    const querySnapshot = await getDocs(q);
                    storyBoard.innerHTML = '';
                    querySnapshot.forEach((doc) => {
                        const item = doc.data();
                        const div = document.createElement('div');
                        div.className = 'story-item';
                        div.innerHTML = `<div class="story-img"><img src="${item.img}"></div><div class="story-txt"><h4>${item.title}</h4><p>${item.text}</p></div>`;
                        div.onclick = () => {
                            if (!isDown) location.href = 'story.html';
                        };
                        storyBoard.appendChild(div);
                    });
                } catch (e) {
                    console.error(e);
                }
            }
            loadStories();
        </script>
    </body>
</html>
